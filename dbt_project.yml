
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'the_most_python'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Layered materialization defaults (individual models can override via config block).
models:
  the_most_python:
    staging:
      +materialized: view
      github_repos:
        stg_github_repos__python_file_contents:
          +materialized: table
      stackoverflow:
        stg_stackoverflow__python_questions:
          +materialized: table
      pypi:
        stg_pypi__libraries:
          +materialized: table
    intermediate:
      +materialized: table
    marts:
      +materialized: table
